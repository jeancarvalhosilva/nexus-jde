<!DOCTYPE html> 
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nexus JDE | Consultoria em Tecnologia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* FUNDO CLARO PREMIUM */
      background: linear-gradient(135deg, #f8fafc, #eef2f7);

      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 80vw;
      max-width: 340px;
      aspect-ratio: 1/1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      width: 75%;
      max-width: 240px;
      z-index: 2;

      /* sombra essencial pra contraste */
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.18));

      animation: float 6s ease-in-out infinite;
    }

    /* glow bem sutil */
    .glow {
      position: absolute;
      width: 130%;
      height: 130%;
      background: radial-gradient(circle, rgba(30,136,229,0.08), transparent 70%);
      filter: blur(60px);
      z-index: 1;
      animation: pulse 6s infinite;
    }

    /* órbita leve */
    .orbit {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 50%;
      animation: rotate 22s linear infinite;
    }

    .orbit.reverse {
      animation-direction: reverse;
      animation-duration: 30s;
      border: 1px solid rgba(30,136,229,0.10);
    }

    /* pontos ajustados */
    .dot {
      width: 7px;
      height: 7px;
      background: #1e88e5;
      border-radius: 50%;
      position: absolute;
      top: -3.5px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 6px rgba(30,136,229,0.4);
    }

    .dot.white {
      background: #374151; /* grafite no lugar do branco */
      box-shadow: none;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes pulse {
      0%,100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }

    @media (max-width: 400px) {
      .dot {
        width: 5px;
        height: 5px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="glow"></div>

    <div class="orbit">
      <div class="dot"></div>
    </div>

    <div class="orbit reverse">
      <div class="dot white"></div>
    </div>

    <!-- logo transparente -->
    <img src="logo.png" class="logo" alt="Nexus JDE">

  </div>

</body>
</html>
